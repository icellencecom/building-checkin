<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Check-In Portal — Front Desk</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0d14;
    --surface: #111520;
    --surface2: #161b2b;
    --surface3: #1c2238;
    --border: #252d45;
    --text: #e8ecf4;
    --muted: #5e6a8a;
    --accent: #3d7fff;
    --accent-glow: rgba(61,127,255,0.15);
    --green: #22c55e;
    --yellow: #f59e0b;
    --purple: #a78bfa;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* LOCK SCREEN */
  #lock-screen {
    position: fixed; inset: 0; z-index: 9999;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    background-image: radial-gradient(ellipse at 30% 50%, rgba(61,127,255,0.07) 0%, transparent 60%),
                      radial-gradient(ellipse at 80% 20%, rgba(120,80,255,0.05) 0%, transparent 50%);
  }
  #lock-screen.hidden { display: none; }
  .lock-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2.5rem 2rem;
    width: 100%; max-width: 380px;
    box-shadow: 0 24px 64px rgba(0,0,0,0.5);
    text-align: center;
    animation: lockIn 0.4s ease;
  }
  @keyframes lockIn {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .lock-icon {
    width: 60px; height: 60px;
    background: linear-gradient(135deg, var(--accent), #6366f1);
    border-radius: 16px;
    display: inline-flex; align-items: center; justify-content: center;
    margin-bottom: 1.2rem;
    box-shadow: 0 8px 24px rgba(61,127,255,0.2);
  }
  .lock-icon svg { width: 28px; height: 28px; }
  .lock-card h2 { font-size: 1.3rem; font-weight: 600; margin-bottom: 0.3rem; }
  .lock-card p  { font-size: 0.83rem; color: var(--muted); margin-bottom: 1.8rem; font-family: 'DM Mono', monospace; }
  .pin-dots { display: flex; justify-content: center; gap: 0.8rem; margin-bottom: 1.8rem; }
  .pin-dot {
    width: 14px; height: 14px; border-radius: 50%;
    border: 2px solid var(--border); background: transparent; transition: all 0.2s;
  }
  .pin-dot.filled { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 8px rgba(61,127,255,0.5); }
  .pin-dot.error  { background: #ef4444; border-color: #ef4444; }
  .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.6rem; max-width: 240px; margin: 0 auto; }
  .num-btn {
    background: var(--surface2); border: 1.5px solid var(--border);
    border-radius: 12px; padding: 1rem; color: var(--text);
    font-size: 1.2rem; font-weight: 500; font-family: 'DM Mono', monospace;
    cursor: pointer; transition: all 0.15s; user-select: none;
  }
  .num-btn:hover  { background: var(--surface3); border-color: var(--accent); }
  .num-btn:active { transform: scale(0.94); }
  .num-btn.zero   { grid-column: 2; }
  .num-btn.del    { background: transparent; border-color: transparent; color: var(--muted); font-size: 1rem; }
  .num-btn.del:hover { color: #ef4444; background: rgba(239,68,68,0.08); border-color: rgba(239,68,68,0.2); }
  .lock-error {
    margin-top: 1rem; font-size: 0.8rem; color: #ef4444;
    font-family: 'DM Mono', monospace; min-height: 1.2em;
  }
  @keyframes shake {
    0%,100%{ transform:translateX(0) } 20%{ transform:translateX(-6px) }
    60%{ transform:translateX(6px) }   80%{ transform:translateX(-3px) }
  }
  #portal-content { display: none; }
  #portal-content.visible { display: block; }

  /* HEADER */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 1rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-left { display: flex; align-items: center; gap: 1rem; }

  .logo {
    width: 40px; height: 40px;
    background: linear-gradient(135deg, var(--accent), #6366f1);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
  }
  .logo svg { width: 20px; height: 20px; }

  .site-title { font-size: 1.1rem; font-weight: 600; }
  .site-sub { font-size: 0.75rem; color: var(--muted); font-family: 'DM Mono', monospace; }

  .header-right { display: flex; align-items: center; gap: 0.8rem; }

  .live-dot {
    display: flex; align-items: center; gap: 0.5rem;
    font-size: 0.78rem; color: var(--green);
    font-family: 'DM Mono', monospace;
  }
  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
    animation: blink 2s ease infinite;
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* STATS BAR */
  .stats-bar {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1px;
    background: var(--border);
    border-bottom: 1px solid var(--border);
  }

  .stat {
    background: var(--surface);
    padding: 1.2rem 2rem;
    text-align: center;
  }

  .stat .num {
    font-size: 1.8rem;
    font-weight: 600;
    font-family: 'DM Mono', monospace;
    letter-spacing: -1px;
  }

  .stat .lbl { font-size: 0.73rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; margin-top: 0.2rem; }
  .stat.employees .num { color: var(--accent); }
  .stat.contractors .num { color: var(--yellow); }
  .stat.visitors .num { color: var(--purple); }
  .stat.total .num { color: var(--text); }

  /* TOOLBAR */
  .toolbar {
    padding: 1.2rem 2rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  .search-wrap { position: relative; flex: 1; min-width: 200px; }
  .search-wrap input {
    width: 100%;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 0.6rem 1rem 0.6rem 2.4rem;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap input::placeholder { color: var(--muted); }
  .search-icon {
    position: absolute; left: 0.75rem; top: 50%; transform: translateY(-50%);
    color: var(--muted); font-size: 0.9rem;
  }

  .filter-btns { display: flex; gap: 0.4rem; }
  .filter-btn {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 0.5rem 0.9rem;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }
  .filter-btn:hover, .filter-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-glow); }
  .filter-btn.all.active { border-color: var(--text); color: var(--text); background: rgba(255,255,255,0.05); }

  .clear-btn {
    background: rgba(239,68,68,0.1);
    border: 1.5px solid rgba(239,68,68,0.3);
    border-radius: 8px;
    padding: 0.5rem 1rem;
    color: #ef4444;
    font-size: 0.8rem;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;
  }
  .clear-btn:hover { background: rgba(239,68,68,0.2); }

  .refresh-btn {
    background: var(--accent-glow);
    border: 1.5px solid var(--accent);
    border-radius: 8px;
    padding: 0.5rem 1rem;
    color: var(--accent);
    font-size: 0.8rem;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;
  }
  .refresh-btn:hover { background: rgba(61,127,255,0.25); }

  /* TABLE */
  main { padding: 1.5rem 2rem; }

  .table-wrap { overflow-x: auto; }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.88rem;
  }

  thead th {
    text-align: left;
    padding: 0.7rem 1rem;
    font-size: 0.72rem;
    font-family: 'DM Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
    cursor: pointer;
  }
  tbody tr:hover { background: var(--surface2); }

  td {
    padding: 0.9rem 1rem;
    vertical-align: middle;
  }

  .badge {
    display: inline-block;
    padding: 0.2rem 0.65rem;
    border-radius: 6px;
    font-size: 0.75rem;
    font-weight: 500;
    font-family: 'DM Mono', monospace;
  }
  .badge.employee  { background: rgba(61,127,255,0.15); color: var(--accent); }
  .badge.contractor { background: rgba(245,158,11,0.15); color: var(--yellow); }
  .badge.visitor   { background: rgba(167,139,250,0.15); color: var(--purple); }

  .name-cell { font-weight: 500; }
  .ts-cell { color: var(--muted); font-family: 'DM Mono', monospace; font-size: 0.78rem; }

  .thumb {
    width: 36px; height: 36px;
    border-radius: 6px;
    object-fit: cover;
    border: 1px solid var(--border);
  }
  .no-photo { width: 36px; height: 36px; border-radius: 6px; background: var(--surface3); display: flex; align-items: center; justify-content: center; font-size: 0.8rem; color: var(--muted); }

  .empty-state {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--muted);
  }
  .empty-state .icon { font-size: 3rem; margin-bottom: 1rem; }
  .empty-state h3 { font-size: 1.1rem; color: var(--text); margin-bottom: 0.5rem; }
  .empty-state p { font-size: 0.85rem; }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    width: 100%;
    max-width: 440px;
    padding: 2rem;
    box-shadow: 0 32px 64px rgba(0,0,0,0.6);
    animation: modalIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.85); }
    to   { opacity: 1; transform: scale(1); }
  }

  .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
  .modal-header h3 { font-size: 1.1rem; font-weight: 600; }
  .modal-close { background: none; border: none; color: var(--muted); font-size: 1.4rem; cursor: pointer; line-height: 1; }
  .modal-close:hover { color: var(--text); }

  .modal-photo { width: 100%; border-radius: 12px; object-fit: cover; max-height: 220px; margin-bottom: 1.2rem; border: 1px solid var(--border); }

  .modal-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 0.6rem 0;
    border-bottom: 1px solid var(--border);
    font-size: 0.88rem;
  }
  .modal-row:last-child { border-bottom: none; }
  .modal-row .k { color: var(--muted); font-family: 'DM Mono', monospace; font-size: 0.78rem; }
  .modal-row .v { font-weight: 500; text-align: right; }

  /* Responsive */
  @media (max-width: 640px) {
    .stats-bar { grid-template-columns: repeat(2, 1fr); }
    header { padding: 0.9rem 1rem; }
    .toolbar { padding: 0.9rem 1rem; }
    main { padding: 1rem; }
    .toolbar .filter-btns { flex-wrap: wrap; }
    thead th:nth-child(4), td:nth-child(4),
    thead th:nth-child(5), td:nth-child(5) { display: none; }
  }
</style>
</head>
<body>

<!-- LOCK SCREEN -->
<div id="lock-screen">
  <div class="lock-card">
    <div class="lock-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
    </div>
    <h2>Front Desk Portal</h2>
    <p>Enter your PIN to continue</p>
    <div class="pin-dots">
      <div class="pin-dot" id="dot-0"></div>
      <div class="pin-dot" id="dot-1"></div>
      <div class="pin-dot" id="dot-2"></div>
      <div class="pin-dot" id="dot-3"></div>
    </div>
    <div class="numpad">
      <button class="num-btn" onclick="pinPress('1')">1</button>
      <button class="num-btn" onclick="pinPress('2')">2</button>
      <button class="num-btn" onclick="pinPress('3')">3</button>
      <button class="num-btn" onclick="pinPress('4')">4</button>
      <button class="num-btn" onclick="pinPress('5')">5</button>
      <button class="num-btn" onclick="pinPress('6')">6</button>
      <button class="num-btn" onclick="pinPress('7')">7</button>
      <button class="num-btn" onclick="pinPress('8')">8</button>
      <button class="num-btn" onclick="pinPress('9')">9</button>
      <button class="num-btn zero" onclick="pinPress('0')">0</button>
      <button class="num-btn del" onclick="pinDel()">⌫</button>
    </div>
    <div class="lock-error" id="lock-error"></div>
  </div>
</div>

<!-- PORTAL CONTENT (hidden until unlocked) -->
<div id="portal-content">

<header>
  <div class="header-left">
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9M15 21V9"/>
      </svg>
    </div>
    <div>
      <div class="site-title">Check-In Portal</div>
      <div class="site-sub">Front Desk Dashboard</div>
    </div>
  </div>
  <div class="header-right">
    <div class="live-dot"><span class="dot"></span> LIVE</div>
    <button class="clear-btn" onclick="clearLogs()">🗑 Clear Log</button>
  </div>
</header>

<div class="stats-bar">
  <div class="stat total">
    <div class="num" id="stat-total">0</div>
    <div class="lbl">Total Today</div>
  </div>
  <div class="stat employees">
    <div class="num" id="stat-emp">0</div>
    <div class="lbl">Employees</div>
  </div>
  <div class="stat contractors">
    <div class="num" id="stat-con">0</div>
    <div class="lbl">Contractors</div>
  </div>
  <div class="stat visitors">
    <div class="num" id="stat-vis">0</div>
    <div class="lbl">Visitors</div>
  </div>
</div>

<div class="toolbar">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="search-input" placeholder="Search by name, company, or who they're visiting..." oninput="renderTable()" />
  </div>
  <div class="filter-btns">
    <button class="filter-btn all active" onclick="setFilter('All', this)">All</button>
    <button class="filter-btn" onclick="setFilter('Employee', this)">Employees</button>
    <button class="filter-btn" onclick="setFilter('Contractor', this)">Contractors</button>
    <button class="filter-btn" onclick="setFilter('Visitor', this)">Visitors</button>
  </div>
  <button class="refresh-btn" onclick="loadData()">↻ Refresh</button>
</div>

<main>
  <div class="table-wrap">
    <table id="log-table">
      <thead>
        <tr>
          <th>Photo</th>
          <th>Name</th>
          <th>Type</th>
          <th>Visiting</th>
          <th>Company</th>
          <th>Time</th>
        </tr>
      </thead>
      <tbody id="log-body"></tbody>
    </table>
    <div class="empty-state" id="empty-state" style="display:none;">
      <div class="icon">📋</div>
      <h3>No check-ins yet</h3>
      <p>Entries will appear here as visitors scan the QR code and check in.</p>
    </div>
  </div>
</main>

<!-- DETAIL MODAL -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal" id="modal-card">
    <div class="modal-header">
      <h3>Check-In Details</h3>
      <button class="modal-close" onclick="closeModalDirect()">×</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<script>
  // ── SUPABASE CONFIG ───────────────────────────────────────
  const SUPABASE_URL = 'https://sfwnutztbzfaztammbie.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_mK8kJodNkPDX4uJduqXoZw_zOXCG0vV';

  let allLogs = [];
  let activeFilter = 'All';

  async function loadData() {
    const refreshBtn = document.querySelector('.refresh-btn');
    if (refreshBtn) { refreshBtn.textContent = '↻ Loading…'; refreshBtn.disabled = true; }
    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/checkins?order=id.desc&limit=500`, {
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${SUPABASE_KEY}`
        }
      });
      const data = await res.json();
      allLogs = Array.isArray(data) ? data : [];
      updateStats();
      renderTable();
    } catch(e) {
      console.error('Refresh failed:', e);
    } finally {
      if (refreshBtn) { refreshBtn.textContent = '↻ Refresh'; refreshBtn.disabled = false; }
    }
  }

  function updateStats() {
    const today = new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    const todayLogs = allLogs.filter(l => l.timestamp && l.timestamp.startsWith(today.split(',')[0]) || true);
    // Show all-time counts since timestamp string format varies; filter last 24h by created_at if needed
    document.getElementById('stat-total').textContent = allLogs.length;
    document.getElementById('stat-emp').textContent = allLogs.filter(l => l.role === 'Employee').length;
    document.getElementById('stat-con').textContent = allLogs.filter(l => l.role === 'Contractor').length;
    document.getElementById('stat-vis').textContent = allLogs.filter(l => l.role === 'Visitor').length;
  }

  function renderTable() {
    const q = document.getElementById('search-input').value.toLowerCase();
    const tbody = document.getElementById('log-body');
    const empty = document.getElementById('empty-state');

    let filtered = allLogs.filter(l => {
      const matchRole = activeFilter === 'All' || l.role === activeFilter;
      const matchSearch = !q || l.name.toLowerCase().includes(q) ||
        l.company.toLowerCase().includes(q) ||
        l.visiting.toLowerCase().includes(q);
      return matchRole && matchSearch;
    });

    if (filtered.length === 0) {
      tbody.innerHTML = '';
      empty.style.display = 'block';
      return;
    }
    empty.style.display = 'none';

    tbody.innerHTML = filtered.map(l => `
      <tr onclick="openModal(${l.id})">
        <td>
          ${l.photo
            ? `<img class="thumb" src="${l.photo}" alt="Photo" />`
            : `<div class="no-photo">—</div>`}
        </td>
        <td class="name-cell">${escHtml(l.name)}</td>
        <td><span class="badge ${l.role.toLowerCase()}">${l.role}</span></td>
        <td>${escHtml(l.visiting)}</td>
        <td>${escHtml(l.company)}</td>
        <td class="ts-cell">${escHtml(l.timestamp)}</td>
      </tr>
    `).join('');
  }

  function setFilter(f, btn) {
    activeFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderTable();
  }

  function openModal(id) {
    const l = allLogs.find(x => x.id === id);
    if (!l) return;

    const mb = document.getElementById('modal-body');
    mb.innerHTML = `
      ${l.photo ? `<img class="modal-photo" src="${l.photo}" alt="ID Photo" />` : ''}
      <div class="modal-row"><span class="k">NAME</span><span class="v">${escHtml(l.name)}</span></div>
      <div class="modal-row"><span class="k">TYPE</span><span class="v"><span class="badge ${l.role.toLowerCase()}">${l.role}</span></span></div>
      <div class="modal-row"><span class="k">TIME</span><span class="v">${escHtml(l.timestamp)}</span></div>
      ${l.role !== 'Employee' ? `
        <div class="modal-row"><span class="k">VISITING</span><span class="v">${escHtml(l.visiting)}</span></div>
        <div class="modal-row"><span class="k">COMPANY</span><span class="v">${escHtml(l.company)}</span></div>
      ` : ''}
    `;
    document.getElementById('modal').classList.add('open');
  }

  function closeModal(e) {
    if (e.target === document.getElementById('modal')) closeModalDirect();
  }
  function closeModalDirect() {
    document.getElementById('modal').classList.remove('open');
  }

  function clearLogs() {
    if (confirm('Clear all check-in logs? This cannot be undone.')) {
      fetch(`${SUPABASE_URL}/rest/v1/checkins?id=gte.0`, {
        method: 'DELETE',
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${SUPABASE_KEY}`
        }
      }).then(() => loadData());
    }
  }

  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // Auto-refresh every 15 seconds
  loadData();
  setInterval(loadData, 15000);

  // ── PIN LOCK ──────────────────────────────────────────────
  // Change this PIN to whatever you want (4 digits)
  const CORRECT_PIN = '1024';

  let pinEntry = '';

  // Check if already unlocked this session
  if (sessionStorage.getItem('portal_unlocked') === 'yes') {
    document.getElementById('lock-screen').classList.add('hidden');
    document.getElementById('portal-content').classList.add('visible');
  }

  function pinPress(digit) {
    if (pinEntry.length >= 4) return;
    pinEntry += digit;
    updateDots();
    if (pinEntry.length === 4) {
      setTimeout(checkPin, 150);
    }
  }

  function pinDel() {
    pinEntry = pinEntry.slice(0, -1);
    updateDots();
    document.getElementById('lock-error').textContent = '';
  }

  function updateDots() {
    for (let i = 0; i < 4; i++) {
      const dot = document.getElementById('dot-' + i);
      dot.classList.toggle('filled', i < pinEntry.length);
      dot.classList.remove('error');
    }
  }

  function checkPin() {
    if (pinEntry === CORRECT_PIN) {
      sessionStorage.setItem('portal_unlocked', 'yes');
      document.getElementById('lock-screen').classList.add('hidden');
      document.getElementById('portal-content').classList.add('visible');
    } else {
      for (let i = 0; i < 4; i++) {
        const dot = document.getElementById('dot-' + i);
        dot.classList.remove('filled');
        dot.classList.add('error');
      }
      const errEl = document.getElementById('lock-error');
      errEl.style.animation = 'none';
      errEl.textContent = 'Incorrect PIN. Try again.';
      void errEl.offsetWidth;
      errEl.style.animation = 'shake 0.35s ease';
      setTimeout(() => {
        for (let i = 0; i < 4; i++) document.getElementById('dot-' + i).classList.remove('error');
        errEl.textContent = '';
      }, 1200);
      pinEntry = '';
    }
  }

  // Keyboard support
  document.addEventListener('keydown', e => {
    if (document.getElementById('lock-screen').classList.contains('hidden')) return;
    if (e.key >= '0' && e.key <= '9') pinPress(e.key);
    if (e.key === 'Backspace') pinDel();
  });
</script>
</div><!-- end portal-content -->
</body>
</html>
