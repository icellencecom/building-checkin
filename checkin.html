<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Building Check-In</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #181c27;
    --surface2: #1e2334;
    --border: #2a3044;
    --text: #e8ecf4;
    --muted: #6b7694;
    --accent: #3d7fff;
    --accent-glow: rgba(61,127,255,0.18);
    --green: #22c55e;
    --green-glow: rgba(34,197,94,0.15);
    --red: #ef4444;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
    background-image: radial-gradient(ellipse at 20% 50%, rgba(61,127,255,0.07) 0%, transparent 60%),
                      radial-gradient(ellipse at 80% 20%, rgba(120,80,255,0.05) 0%, transparent 50%);
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    width: 100%;
    max-width: 480px;
    padding: 2.5rem 2rem;
    box-shadow: 0 24px 64px rgba(0,0,0,0.5);
    animation: slideUp 0.4s ease;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .logo-area {
    text-align: center;
    margin-bottom: 2rem;
  }

  .building-icon {
    width: 56px;
    height: 56px;
    background: linear-gradient(135deg, var(--accent), #6366f1);
    border-radius: 16px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 1rem;
    box-shadow: 0 8px 24px var(--accent-glow);
  }

  .building-icon svg { width: 28px; height: 28px; }

  h1 {
    font-size: 1.5rem;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.3px;
  }

  .subtitle {
    font-size: 0.85rem;
    color: var(--muted);
    margin-top: 0.3rem;
    font-family: 'DM Mono', monospace;
  }

  /* Role selector */
  .role-selector {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0.6rem;
    margin-bottom: 1.8rem;
  }

  .role-btn {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 0.8rem 0.4rem;
    cursor: pointer;
    text-align: center;
    transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
    color: var(--muted);
    font-size: 0.82rem;
    font-weight: 500;
  }

  .role-btn .role-icon { font-size: 1.4rem; display: block; margin-bottom: 0.3rem; }
  .role-btn:hover { border-color: var(--accent); color: var(--text); }
  .role-btn.active {
    border-color: var(--accent);
    background: var(--accent-glow);
    color: var(--accent);
    box-shadow: 0 0 0 3px rgba(61,127,255,0.1);
  }

  /* Form */
  .form-group { margin-bottom: 1.2rem; }

  label {
    display: block;
    font-size: 0.78rem;
    font-weight: 500;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 0.5rem;
    font-family: 'DM Mono', monospace;
  }

  input[type="text"], input[type="email"], select {
    width: 100%;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 0.8rem 1rem;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
    -webkit-appearance: none;
  }

  input:focus, select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }

  input::placeholder { color: var(--muted); }

  select option { background: var(--surface2); }

  /* Photo upload */
  .photo-upload {
    border: 1.5px dashed var(--border);
    border-radius: 12px;
    padding: 1.5rem;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    background: var(--surface2);
  }

  .photo-upload:hover { border-color: var(--accent); }
  .photo-upload input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; }

  .photo-upload .upload-icon { font-size: 2rem; margin-bottom: 0.5rem; }
  .photo-upload p { font-size: 0.85rem; color: var(--muted); }
  .photo-upload span { color: var(--accent); font-weight: 500; }

  #photo-preview {
    width: 100%;
    max-height: 180px;
    object-fit: cover;
    border-radius: 10px;
    margin-top: 0.8rem;
    display: none;
  }

  /* Submit */
  .submit-btn {
    width: 100%;
    background: linear-gradient(135deg, var(--accent), #6366f1);
    border: none;
    border-radius: 12px;
    padding: 1rem;
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s;
    margin-top: 0.6rem;
    letter-spacing: 0.2px;
  }

  .submit-btn:hover { opacity: 0.9; transform: translateY(-1px); }
  .submit-btn:active { transform: translateY(0); }
  .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .visitor-only { display: none; }

  /* Success screen */
  #success-screen {
    display: none;
    text-align: center;
    animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1);
  }

  @keyframes popIn {
    from { opacity: 0; transform: scale(0.7); }
    to   { opacity: 1; transform: scale(1); }
  }

  .checkmark-circle {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    background: var(--green-glow);
    border: 3px solid var(--green);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 1.5rem;
    box-shadow: 0 0 40px var(--green-glow), 0 0 80px rgba(34,197,94,0.08);
    animation: pulse 2s ease infinite;
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 40px var(--green-glow), 0 0 80px rgba(34,197,94,0.08); }
    50%       { box-shadow: 0 0 60px rgba(34,197,94,0.3), 0 0 100px rgba(34,197,94,0.12); }
  }

  .checkmark-circle svg { width: 50px; height: 50px; }

  #success-screen h2 { font-size: 1.8rem; font-weight: 600; color: var(--green); margin-bottom: 0.5rem; }
  #success-screen .ok-msg { color: var(--muted); font-size: 0.95rem; margin-bottom: 1.5rem; }

  .checkin-details {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1rem 1.2rem;
    text-align: left;
    font-size: 0.85rem;
  }

  .checkin-details .row {
    display: flex;
    justify-content: space-between;
    padding: 0.4rem 0;
    border-bottom: 1px solid var(--border);
  }
  .checkin-details .row:last-child { border-bottom: none; }
  .checkin-details .key { color: var(--muted); font-family: 'DM Mono', monospace; font-size: 0.78rem; }
  .checkin-details .val { color: var(--text); font-weight: 500; }

  .new-checkin-btn {
    margin-top: 1.5rem;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 0.7rem 1.5rem;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem;
    cursor: pointer;
    transition: all 0.2s;
  }

  .new-checkin-btn:hover { color: var(--text); border-color: var(--accent); }

  .error-msg { color: var(--red); font-size: 0.82rem; margin-top: 0.4rem; display: none; }
  .req { color: var(--red); margin-left: 2px; }
</style>
</head>
<body>

<div class="card">
  <!-- CHECK-IN FORM -->
  <div id="form-screen">
    <div class="logo-area">
      <div class="building-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9M15 21V9"/>
        </svg>
      </div>
      <h1>Building Check-In</h1>
      <p class="subtitle">Scan · Sign In · Show Front Desk</p>
    </div>

    <div class="role-selector">
      <button class="role-btn" data-role="Employee" onclick="setRole(this)">
        <span class="role-icon">👔</span>Employee
      </button>
      <button class="role-btn" data-role="Contractor" onclick="setRole(this)">
        <span class="role-icon">🦺</span>Contractor
      </button>
      <button class="role-btn active" data-role="Visitor" onclick="setRole(this)">
        <span class="role-icon">🪪</span>Visitor
      </button>
    </div>

    <div class="form-group">
      <label>Full Name <span class="req">*</span></label>
      <input type="text" id="full-name" placeholder="Your full name" />
    </div>

    <div class="visitor-only form-group">
      <label>Visiting / Meeting With <span class="req">*</span></label>
      <input type="text" id="visiting" placeholder="Who are you here to see?" />
    </div>

    <div class="visitor-only form-group">
      <label>Company / Organization <span class="req" id="req-company">*</span></label>
      <input type="text" id="company" placeholder="Your company name" />
    </div>

    <div class="visitor-only form-group">
      <label>Photo ID <span class="req">*</span></label>
      <div class="photo-upload" id="photo-drop">
        <div class="upload-icon">📷</div>
        <p>Tap to take photo or <span>upload from device</span></p>
        <input type="file" id="photo-input" accept="image/*" capture="environment" onchange="previewPhoto(this)" />
      </div>
      <img id="photo-preview" alt="ID Preview" />
    </div>

    <p class="error-msg" id="err-msg">Please fill in all required fields.</p>

    <button class="submit-btn" id="submit-btn" onclick="submitCheckin()">
      Check In ✓
    </button>
  </div>

  <!-- SUCCESS SCREEN -->
  <div id="success-screen">
    <div class="checkmark-circle">
      <svg viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>
    <h2>You're Checked In</h2>
    <p class="ok-msg">Show this screen to the front desk</p>
    <div class="checkin-details" id="checkin-details"></div>
    <button class="new-checkin-btn" onclick="resetForm()">← New Check-In</button>
  </div>
</div>

<script>
  let currentRole = 'Visitor';
  document.querySelectorAll('.visitor-only').forEach(f => f.style.display = 'block');
  let photoData = null;
  // Show correct required markers on load
  document.addEventListener('DOMContentLoaded', updateRequiredMarkers);
  // Also run immediately since script is at end of body
  setTimeout(updateRequiredMarkers, 0);

  function setRole(btn) {
    document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentRole = btn.dataset.role;
    const visitorFields = document.querySelectorAll('.visitor-only');
    if (currentRole === 'Contractor' || currentRole === 'Visitor') {
      visitorFields.forEach(f => f.style.display = 'block');
    } else {
      visitorFields.forEach(f => f.style.display = 'none');
    }
    updateRequiredMarkers();
  }

  function updateRequiredMarkers() {
    // Company is required for Contractor only, optional for Visitor
    document.getElementById('req-company').style.display = currentRole === 'Contractor' ? 'inline' : 'none';
  }

  function previewPhoto(input) {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      photoData = e.target.result;
      const preview = document.getElementById('photo-preview');
      preview.src = photoData;
      preview.style.display = 'block';
      document.querySelector('.photo-upload .upload-icon').textContent = '✅';
      document.querySelector('.photo-upload p').textContent = 'Photo captured';
    };
    reader.readAsDataURL(file);
  }

  function submitCheckin() {
    const name = document.getElementById('full-name').value.trim();
    const errEl = document.getElementById('err-msg');
    errEl.style.display = 'none';

    if (!name) { errEl.style.display = 'block'; errEl.textContent = 'Please enter your name.'; return; }

    let visiting = '', company = '';
    if (currentRole !== 'Employee') {
      visiting = document.getElementById('visiting').value.trim();
      company = document.getElementById('company').value.trim();

      if (!visiting) {
        errEl.style.display = 'block'; errEl.textContent = 'Please enter who you are visiting.'; return;
      }
      if (currentRole === 'Contractor' && !company) {
        errEl.style.display = 'block'; errEl.textContent = 'Please enter your company name.'; return;
      }
      if (!photoData) {
        errEl.style.display = 'block'; errEl.textContent = 'A photo ID is required.'; return;
      }
    }

    const now = new Date();
    const timestamp = now.toLocaleString('en-US', {
      month: 'short', day: 'numeric', year: 'numeric',
      hour: 'numeric', minute: '2-digit', hour12: true
    });

    const record = {
      id: Date.now(),
      name,
      role: currentRole,
      visiting: visiting || '—',
      company: company || '—',
      timestamp,
      photo: photoData || null
    };

    // Save to localStorage for the admin portal
    const logs = JSON.parse(localStorage.getItem('checkin_logs') || '[]');
    logs.unshift(record);
    localStorage.setItem('checkin_logs', JSON.stringify(logs));

    // Show success
    showSuccess(record);
  }

  function showSuccess(record) {
    document.getElementById('form-screen').style.display = 'none';
    const ss = document.getElementById('success-screen');
    ss.style.display = 'block';

    const details = document.getElementById('checkin-details');
    let rows = `
      <div class="row"><span class="key">NAME</span><span class="val">${record.name}</span></div>
      <div class="row"><span class="key">TYPE</span><span class="val">${record.role}</span></div>
      <div class="row"><span class="key">TIME</span><span class="val">${record.timestamp}</span></div>
    `;
    if (record.role !== 'Employee') {
      rows += `
        <div class="row"><span class="key">VISITING</span><span class="val">${record.visiting}</span></div>
        <div class="row"><span class="key">COMPANY</span><span class="val">${record.company}</span></div>
      `;
    }
    details.innerHTML = rows;
  }

  function resetForm() {
    document.getElementById('form-screen').style.display = 'block';
    document.getElementById('success-screen').style.display = 'none';
    document.getElementById('full-name').value = '';
    document.getElementById('visiting').value = '';
    document.getElementById('company').value = '';
    document.getElementById('photo-preview').style.display = 'none';
    document.getElementById('photo-input').value = '';
    document.querySelector('.photo-upload .upload-icon').textContent = '📷';
    document.querySelector('.photo-upload p').innerHTML = 'Tap to take photo or <span>upload from device</span>';
    photoData = null;
    document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
    document.querySelector('[data-role="Visitor"]').classList.add('active');
    currentRole = 'Visitor';
    document.querySelectorAll('.visitor-only').forEach(f => f.style.display = 'block');
    updateRequiredMarkers();
  }
</script>
</body>
</html>
